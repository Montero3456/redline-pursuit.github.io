<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Down Police Chase</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #11161f;
      color: #f8fafc;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .game-shell {
      position: relative;
      width: min(100vw, 1180px);
      height: min(100vh, 760px);
      background: #18202b;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #1f2933;
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .top-bar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .readouts {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      min-width: 112px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(12, 17, 24, 0.68);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .chip span {
      display: block;
      color: #9fb0c3;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chip strong {
      display: block;
      margin-top: 3px;
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1;
      color: #ffffff;
    }

    .controls {
      max-width: 300px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(12, 17, 24, 0.62);
      color: #d8e2ec;
      font-size: 13px;
      line-height: 1.35;
      text-align: right;
      backdrop-filter: blur(8px);
    }

    .center-message {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(86vw, 460px);
      transform: translate(-50%, -50%);
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(12, 17, 24, 0.78);
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .center-message.hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.98);
      pointer-events: none;
    }

    .center-message h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .center-message p {
      margin: 0;
      color: #c6d1dd;
      font-size: 15px;
      line-height: 1.45;
    }

    .danger {
      color: #ff5c77;
    }

    @media (max-width: 700px) {
      .game-shell {
        width: 100vw;
        height: 100vh;
      }

      .top-bar {
        align-items: stretch;
        flex-direction: column;
      }

      .readouts {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .chip {
        min-width: 0;
      }

      .controls {
        max-width: none;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Top down police chase game">
    <canvas id="gameCanvas"></canvas>
    <section class="hud" aria-live="polite">
      <div class="top-bar">
        <div class="readouts">
          <div class="chip">
            <span>Survived</span>
            <strong id="timeValue">0.0s</strong>
          </div>
          <div class="chip">
            <span>Best</span>
            <strong id="bestValue">0.0s</strong>
          </div>
          <div class="chip">
            <span>Heat</span>
            <strong id="heatValue">1</strong>
          </div>
        </div>
        <div class="controls">WASD or arrow keys to drive. Space or Enter restarts after capture.</div>
      </div>
      <div id="message" class="center-message">
        <h1>Police Chase</h1>
        <p>Outrun the cruisers for as long as you can. Move to start.</p>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const timeValue = document.getElementById("timeValue");
    const bestValue = document.getElementById("bestValue");
    const heatValue = document.getElementById("heatValue");
    const message = document.getElementById("message");

    const keys = new Set();
    const obstacles = [];
    const cops = [];
    const roadLines = [];
    const skidMarks = [];
    const smokePuffs = [];

    const world = {
      width: 2600,
      height: 1800
    };

    const player = {
      x: world.width / 2,
      y: world.height / 2,
      angle: -Math.PI / 2,
      speed: 0,
      radius: 18,
      invulnerable: 0
    };

    let cameraX = 0;
    let cameraY = 0;
    let width = 0;
    let height = 0;
    let lastTime = performance.now();
    let survived = 0;
    let best = Number(localStorage.getItem("police-chase-best") || 0);
    let state = "ready";
    let spawnClock = 0;
    let copsDodged = 0;

    bestValue.textContent = `${best.toFixed(1)}s`;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      width = rect.width;
      height = rect.height;
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function angleTo(from, to) {
      return Math.atan2(to.y - from.y, to.x - from.x);
    }

    function angleDelta(a, b) {
      return Math.atan2(Math.sin(b - a), Math.cos(b - a));
    }

    function resetGame() {
      player.x = world.width / 2;
      player.y = world.height / 2;
      player.angle = -Math.PI / 2;
      player.speed = 0;
      player.invulnerable = 1.1;
      survived = 0;
      spawnClock = 0;
      copsDodged = 0;
      cops.length = 0;
      skidMarks.length = 0;
      smokePuffs.length = 0;
      addCop(world.width / 2 - 360, world.height / 2 + 320, 0.92);
      state = "playing";
      message.classList.add("hidden");
    }

    function capturePlayer() {
      state = "caught";
      player.speed = 0;
      best = Math.max(best, survived);
      localStorage.setItem("police-chase-best", best.toFixed(2));
      bestValue.textContent = `${best.toFixed(1)}s`;
      message.innerHTML = `<h1 class="danger">Caught</h1><p>You survived ${survived.toFixed(1)} seconds. Press Space or Enter to restart.</p>`;
      message.classList.remove("hidden");
    }

    function addCop(x, y, aggression) {
      cops.push({
        x,
        y,
        angle: angleTo({ x, y }, player),
        speed: 0,
        radius: 19,
        aggression,
        sirenPhase: Math.random() * Math.PI * 2
      });
    }

    function buildCity() {
      obstacles.length = 0;
      roadLines.length = 0;

      for (let x = 300; x < world.width; x += 420) {
        roadLines.push({ x, y: 0, w: 8, h: world.height, type: "vertical" });
      }

      for (let y = 250; y < world.height; y += 360) {
        roadLines.push({ x: 0, y, w: world.width, h: 8, type: "horizontal" });
      }

      const blocks = [
        [120, 110, 210, 145], [535, 80, 260, 190], [955, 95, 280, 150], [1430, 110, 210, 200], [1885, 85, 310, 170],
        [100, 510, 250, 180], [590, 480, 190, 230], [1035, 515, 250, 185], [1515, 465, 240, 225], [2020, 505, 300, 170],
        [155, 920, 220, 190], [555, 910, 300, 155], [1005, 890, 250, 240], [1455, 930, 315, 160], [1985, 885, 260, 245],
        [115, 1335, 285, 170], [610, 1290, 210, 235], [1015, 1330, 305, 175], [1510, 1285, 230, 260], [1960, 1325, 315, 180]
      ];

      for (const [x, y, w, h] of blocks) {
        obstacles.push({ x, y, w, h, shade: 0.82 + Math.random() * 0.16 });
      }
    }

    function pushOutOfRect(car, rect) {
      const nearestX = clamp(car.x, rect.x, rect.x + rect.w);
      const nearestY = clamp(car.y, rect.y, rect.y + rect.h);
      const dx = car.x - nearestX;
      const dy = car.y - nearestY;
      const hit = Math.hypot(dx, dy) < car.radius;

      if (!hit) return false;

      const overlapLeft = Math.abs(car.x - rect.x);
      const overlapRight = Math.abs(rect.x + rect.w - car.x);
      const overlapTop = Math.abs(car.y - rect.y);
      const overlapBottom = Math.abs(rect.y + rect.h - car.y);
      const smallest = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

      if (smallest === overlapLeft) car.x = rect.x - car.radius;
      else if (smallest === overlapRight) car.x = rect.x + rect.w + car.radius;
      else if (smallest === overlapTop) car.y = rect.y - car.radius;
      else car.y = rect.y + rect.h + car.radius;

      car.speed *= -0.28;
      return true;
    }

    function updatePlayer(dt) {
      const forward = keys.has("ArrowUp") || keys.has("KeyW");
      const backward = keys.has("ArrowDown") || keys.has("KeyS");
      const left = keys.has("ArrowLeft") || keys.has("KeyA");
      const right = keys.has("ArrowRight") || keys.has("KeyD");

      if (state === "ready" && (forward || backward || left || right)) {
        resetGame();
      }

      if (state !== "playing") return;

      const acceleration = forward ? 460 : backward ? -300 : 0;
      const traction = player.speed > 0 ? 0.984 : 0.975;
      const turnStrength = clamp(Math.abs(player.speed) / 210, 0.25, 1);

      player.speed += acceleration * dt;
      player.speed *= Math.pow(traction, dt * 60);
      player.speed = clamp(player.speed, -210, 430);

      if (left) player.angle -= 3.15 * turnStrength * dt * Math.sign(player.speed || 1);
      if (right) player.angle += 3.15 * turnStrength * dt * Math.sign(player.speed || 1);

      player.x += Math.cos(player.angle) * player.speed * dt;
      player.y += Math.sin(player.angle) * player.speed * dt;
      player.x = clamp(player.x, 32, world.width - 32);
      player.y = clamp(player.y, 32, world.height - 32);
      player.invulnerable = Math.max(0, player.invulnerable - dt);

      for (const rect of obstacles) {
        if (pushOutOfRect(player, rect)) {
          addSmoke(player.x, player.y, 5);
        }
      }

      if ((left || right) && Math.abs(player.speed) > 230) {
        skidMarks.push({
          x: player.x - Math.cos(player.angle) * 15,
          y: player.y - Math.sin(player.angle) * 15,
          angle: player.angle,
          life: 1
        });
      }
    }

    function updateCops(dt) {
      if (state !== "playing") return;

      spawnClock -= dt;
      const heat = 1 + Math.floor(survived / 12);
      if (spawnClock <= 0 && cops.length < Math.min(8, heat + 2)) {
        const edge = Math.floor(Math.random() * 4);
        const margin = 80;
        let x = player.x;
        let y = player.y;

        if (edge === 0) { x += (Math.random() - 0.5) * 900; y -= height * 0.75 + margin; }
        if (edge === 1) { x += height * 0.75 + margin; y += (Math.random() - 0.5) * 700; }
        if (edge === 2) { x += (Math.random() - 0.5) * 900; y += height * 0.75 + margin; }
        if (edge === 3) { x -= height * 0.75 + margin; y += (Math.random() - 0.5) * 700; }

        addCop(clamp(x, 60, world.width - 60), clamp(y, 60, world.height - 60), 0.9 + heat * 0.05);
        spawnClock = clamp(7 - heat * 0.55, 2.4, 7);
      }

      for (const cop of cops) {
        const targetAngle = angleTo(cop, player);
        const turn = clamp(angleDelta(cop.angle, targetAngle), -2.5 * dt, 2.5 * dt);
        const desiredSpeed = clamp(260 + survived * 4.8 + cop.aggression * 40, 260, 500);

        cop.angle += turn;
        cop.speed += (desiredSpeed - cop.speed) * dt * 0.75;
        cop.x += Math.cos(cop.angle) * cop.speed * dt;
        cop.y += Math.sin(cop.angle) * cop.speed * dt;
        cop.x = clamp(cop.x, 28, world.width - 28);
        cop.y = clamp(cop.y, 28, world.height - 28);
        cop.sirenPhase += dt * 8;

        for (const rect of obstacles) {
          if (pushOutOfRect(cop, rect)) {
            cop.angle += Math.PI * (Math.random() > 0.5 ? 0.35 : -0.35);
          }
        }

        if (player.invulnerable <= 0 && distance(cop, player) < cop.radius + player.radius - 3) {
          capturePlayer();
          return;
        }
      }

      for (let i = cops.length - 1; i >= 0; i--) {
        if (distance(cops[i], player) > 1700) {
          cops.splice(i, 1);
          copsDodged += 1;
        }
      }
    }

    function addSmoke(x, y, amount) {
      for (let i = 0; i < amount; i++) {
        smokePuffs.push({
          x: x + (Math.random() - 0.5) * 28,
          y: y + (Math.random() - 0.5) * 28,
          vx: (Math.random() - 0.5) * 25,
          vy: (Math.random() - 0.5) * 25,
          size: 10 + Math.random() * 18,
          life: 0.55 + Math.random() * 0.25
        });
      }
    }

    function updateEffects(dt) {
      for (let i = skidMarks.length - 1; i >= 0; i--) {
        skidMarks[i].life -= dt * 0.18;
        if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
      }

      for (let i = smokePuffs.length - 1; i >= 0; i--) {
        const puff = smokePuffs[i];
        puff.life -= dt;
        puff.x += puff.vx * dt;
        puff.y += puff.vy * dt;
        puff.size += dt * 18;
        if (puff.life <= 0) smokePuffs.splice(i, 1);
      }
    }

    function drawWorld() {
      ctx.fillStyle = "#202832";
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.translate(-cameraX, -cameraY);

      ctx.fillStyle = "#2a3440";
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      for (let x = 0; x <= world.width; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, world.height);
        ctx.stroke();
      }
      for (let y = 0; y <= world.height; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(world.width, y);
        ctx.stroke();
      }

      for (const line of roadLines) {
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        if (line.type === "vertical") {
          for (let y = 16; y < world.height; y += 72) ctx.fillRect(line.x - 2, y, 4, 34);
        } else {
          for (let x = 16; x < world.width; x += 72) ctx.fillRect(x, line.y - 2, 34, 4);
        }
      }

      for (const rect of obstacles) {
        ctx.fillStyle = `rgba(${Math.floor(72 * rect.shade)}, ${Math.floor(88 * rect.shade)}, ${Math.floor(105 * rect.shade)}, 1)`;
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        for (let x = rect.x + 18; x < rect.x + rect.w - 16; x += 34) {
          for (let y = rect.y + 18; y < rect.y + rect.h - 16; y += 32) {
            ctx.fillRect(x, y, 10, 8);
          }
        }
      }

      ctx.strokeStyle = "rgba(0,0,0,0.35)";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      for (const mark of skidMarks) {
        ctx.globalAlpha = clamp(mark.life, 0, 0.45);
        ctx.beginPath();
        ctx.moveTo(mark.x - Math.sin(mark.angle) * 12, mark.y + Math.cos(mark.angle) * 12);
        ctx.lineTo(mark.x - Math.sin(mark.angle) * 36, mark.y + Math.cos(mark.angle) * 36);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      for (const puff of smokePuffs) {
        ctx.fillStyle = `rgba(210, 218, 224, ${clamp(puff.life, 0, 0.35)})`;
        ctx.beginPath();
        ctx.arc(puff.x, puff.y, puff.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const cop of cops) drawCar(cop, "#f7f8fb", "#111827", true);
      drawCar(player, "#ffb33d", "#151515", false);

      ctx.restore();
    }

    function drawCar(car, body, trim, isCop) {
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.angle);

      ctx.fillStyle = "rgba(0,0,0,0.22)";
      ctx.fillRect(-22, -13, 48, 28);

      ctx.fillStyle = body;
      roundRect(-24, -14, 48, 28, 5);
      ctx.fill();

      ctx.fillStyle = trim;
      ctx.fillRect(-8, -11, 18, 22);
      ctx.fillStyle = "rgba(255,255,255,0.78)";
      ctx.fillRect(8, -10, 7, 20);
      ctx.fillStyle = "#111827";
      ctx.fillRect(-18, -16, 9, 3);
      ctx.fillRect(-18, 13, 9, 3);
      ctx.fillRect(12, -16, 9, 3);
      ctx.fillRect(12, 13, 9, 3);

      if (isCop) {
        ctx.fillStyle = "#111827";
        ctx.fillRect(-4, -14, 10, 28);
        ctx.fillStyle = Math.sin(car.sirenPhase) > 0 ? "#ef4444" : "#3b82f6";
        ctx.fillRect(-5, -4, 12, 8);
      } else {
        ctx.fillStyle = "#fff4cf";
        ctx.fillRect(18, -8, 5, 6);
        ctx.fillRect(18, 2, 5, 6);
        ctx.fillStyle = "#ef4444";
        ctx.fillRect(-23, -9, 4, 6);
        ctx.fillRect(-23, 3, 4, 6);
      }

      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function updateHud() {
      timeValue.textContent = `${survived.toFixed(1)}s`;
      bestValue.textContent = `${best.toFixed(1)}s`;
      heatValue.textContent = `${1 + Math.floor(survived / 12)}`;
    }

    function tick(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      if (state === "playing") {
        survived += dt;
        best = Math.max(best, survived);
      }
      updatePlayer(dt);
      updateCops(dt);
      updateEffects(dt);
      updateHud();

      const targetCameraX = clamp(player.x - width / 2, 0, world.width - width);
      const targetCameraY = clamp(player.y - height / 2, 0, world.height - height);
      cameraX += (targetCameraX - cameraX) * 0.12;
      cameraY += (targetCameraY - cameraY) * 0.12;

      drawWorld();
      requestAnimationFrame(tick);
    }

    window.addEventListener("keydown", (event) => {
      keys.add(event.code);
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
        event.preventDefault();
      }
      if (state === "caught" && (event.code === "Space" || event.code === "Enter")) {
        resetGame();
      }
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    window.addEventListener("resize", resize);

    resize();
    buildCity();
    addCop(world.width / 2 - 360, world.height / 2 + 320, 0.92);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
